services:
  - type: web
    name: clinic-flow-web
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && npx prisma db seed && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-flow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: clinic-flow-db
    plan: free
    databaseName: clinic_flow
    user: clinic_admin
