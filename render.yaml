services:
  - type: web
    name: clinic-flow-web
    env: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build && npx prisma db push && npx prisma db seed
    startCommand: npm run start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
